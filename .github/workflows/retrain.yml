name: Retrain Heart Disease Model

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns_ci
        run: mlflow run MLProject --env-manager=local

      - name: Upload training outputs
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-training-outputs
          path: |
            MLProject/outputs/model
            mlruns_ci

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image from MLflow model
        run: mlflow models build-docker -m MLProject/outputs/model -n ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-smsml:latest --env-manager local

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-smsml:latest
